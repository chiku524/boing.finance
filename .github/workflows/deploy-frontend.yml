name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare Authentication
        run: |
          echo "Verifying Cloudflare API token and account ID..."
          # ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ Error: CLOUDFLARE_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ Error: CLOUDFLARE_ACCOUNT_ID secret is not set"
            exit 1
          fi
          echo "✅ Cloudflare credentials configured"
          echo "Note: Projects will be auto-created on first deployment if they don't exist"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build for Production
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')
        working-directory: frontend
        run: npm run build:prod
        env:
          REACT_APP_ENV: production
          REACT_APP_BACKEND_URL: https://boing-api-prod.nico-chikuji.workers.dev
          CI: false

      - name: Build for Staging
        if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
        working-directory: frontend
        run: npm run build:staging
        env:
          REACT_APP_ENV: staging
          REACT_APP_BACKEND_URL: https://boing-api-staging.nico-chikuji.workers.dev
          CI: false

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')
        working-directory: frontend
        run: |
          echo "🚀 Deploying to Cloudflare Pages (Production)..."
          echo "Project: boing-finance-prod"
          echo "Note: Project will be auto-created if it doesn't exist"
          wrangler pages deploy dist \
            --project-name=boing-finance-prod \
            --branch=main \
            --commit-dirty=true || {
              echo "⚠️ Deployment failed. Checking if project exists..."
              echo "If project doesn't exist, it will be created automatically."
              exit 1
            }
        env:
          # ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Staging)
        if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
        working-directory: frontend
        run: |
          echo "🚀 Deploying to Cloudflare Pages (Staging)..."
          echo "Project: boing-finance"
          echo "Note: Project will be auto-created if it doesn't exist"
          wrangler pages deploy dist \
            --project-name=boing-finance \
            --branch=staging \
            --commit-dirty=true || {
              echo "⚠️ Deployment failed. Checking if project exists..."
              echo "If project doesn't exist, it will be created automatically."
              exit 1
            }
        env:
          # ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "✅ Deployed to **Production**: https://boing-finance-prod.pages.dev" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deployed to **Staging**: https://boing-finance.pages.dev" >> $GITHUB_STEP_SUMMARY
          fi

