<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the main text -->
    <linearGradient id="boingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#45B7D1;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#96CEB4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEAA7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for bounce elements -->
    <linearGradient id="bounceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Circular clip path -->
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>
  
  <!-- Multiple dark background layers for maximum contrast -->
  <circle cx="100" cy="100" r="95" fill="#000000" opacity="0.9"/>
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" opacity="0.8"/>
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" opacity="0.7"/>
  
  <!-- Very subtle gradient background -->
  <circle cx="100" cy="100" r="95" fill="url(#boingGradient)" opacity="0.2"/>
  
  <!-- Additional dark overlay for even more contrast -->
  <circle cx="100" cy="100" r="95" fill="#000000" opacity="0.5"/>
  
  <!-- Background bounce elements with simple animations -->
  <g opacity="0.15" clip-path="url(#circleClip)">
    <!-- Bounce circles with simple opacity animations - spread out more -->
    <circle cx="50" cy="150" r="8" fill="url(#bounceGradient)" filter="url(#dropShadow)">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="85" cy="130" r="6" fill="url(#bounceGradient)" filter="url(#dropShadow)">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="115" cy="140" r="7" fill="url(#bounceGradient)" filter="url(#dropShadow)">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="150" cy="120" r="9" fill="url(#bounceGradient)" filter="url(#dropShadow)">
      <animate attributeName="opacity" values="0.15;0.38;0.15" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="130" cy="155" r="5" fill="url(#bounceGradient)" filter="url(#dropShadow)">
      <animate attributeName="opacity" values="0.15;0.32;0.15" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Additional animated elements around the circle - more spread out -->
    <circle cx="30" cy="100" r="4" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="170" cy="100" r="4" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="30" r="4" fill="#45B7D1">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="170" r="4" fill="#96CEB4">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Additional spread out elements -->
    <circle cx="60" cy="70" r="3" fill="#FF8E53">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="140" cy="70" r="3" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="60" cy="130" r="3" fill="#45B7D1">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="140" cy="130" r="3" fill="#96CEB4">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main "BOING" text - geometric, bold, modern sans-serif style -->
  <g transform="translate(100, 100) scale(0.7)" opacity="0.95">
    <!-- B - bold, wide, with two distinct slightly rectangular/oval bowls using a mask for clean holes -->
    <mask id="bMask3">
      <rect x="-90" y="-40" width="60" height="80" fill="white"/>
      <rect x="-68" y="-20" width="14" height="16" rx="5" fill="black"/>
      <rect x="-68" y="10" width="14" height="18" rx="5" fill="black"/>
    </mask>
    <path d="M-85 -30 L-85 30 L-55 30 Q-35 30 -35 15 Q-35 0 -55 0 Q-35 0 -35 -15 Q-35 -30 -55 -30 L-85 -30 Z" fill="url(#boingGradient)" stroke="#1a1a1a" stroke-width="2" mask="url(#bMask3)"/>

    <!-- O - moved a little to the right for improved spacing -->
    <ellipse cx="-38" cy="0" rx="13" ry="20" fill="url(#boingGradient)" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="-38" cy="0" rx="7" ry="13" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
    <!-- I -->
    <rect x="-25" y="-25" width="8" height="50" rx="4" fill="url(#boingGradient)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- N -->
    <path d="M-10 25 L-10 -25 L0 -25 L15 10 L15 -25 L25 -25 L25 25 L15 25 L0 -10 L0 25 Z" fill="url(#boingGradient)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- G - only show the gradient bar, remove the dark rectangle behind it -->
    <g transform="translate(140,0) scale(-1,1)">
      <path d="M62 -10 A24 24 0 1 1 62 10" fill="none" stroke="#1a1a1a" stroke-width="10"/>
      <path d="M62 -10 A24 24 0 1 1 62 10" fill="none" stroke="url(#boingGradient)" stroke-width="6"/>
      <rect x="60" y="5" width="25" height="6" rx="2" fill="url(#boingGradient)"/>
    </g>
  </g>
  
  <!-- Simple animated bounce effect lines around the circle -->
  <g opacity="0.6" clip-path="url(#circleClip)">
    <!-- Top bounce line -->
    <path d="M60 30 Q70 25 80 30 Q90 35 100 30 Q110 25 120 30" 
          stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Bottom bounce line -->
    <path d="M80 170 Q90 165 100 170 Q110 175 120 170" 
          stroke="#4ECDC4" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Left bounce line -->
    <path d="M30 80 Q25 90 30 100 Q35 110 30 120" 
          stroke="#45B7D1" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="1.8s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right bounce line -->
    <path d="M170 80 Q175 90 170 100 Q165 110 170 120" 
          stroke="#96CEB4" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Bounce arrows -->
    <path d="M55 35 L60 30 L65 35" stroke="#FF8E53" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M135 35 L140 30 L145 35" stroke="#FF8E53" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M55 165 L60 170 L65 165" stroke="#45B7D1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M135 165 L140 170 L145 165" stroke="#45B7D1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Simple animated sparkle effects around the circle -->
  <g opacity="0.7" clip-path="url(#circleClip)">
    <!-- Sparkles around the perimeter -->
    <path d="M25 25 L27 27 L25 29 L23 27 Z" fill="#FFEAA7">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M175 25 L177 27 L175 29 L173 27 Z" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M28 175 L30 177 L28 179 L26 177 Z" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M172 175 L174 177 L172 179 L170 177 Z" fill="#96CEB4">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3.2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Additional sparkles -->
    <path d="M45 15 L48 18 L45 21 L42 18 Z" fill="#FF8E53">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M155 15 L158 18 L155 21 L152 18 Z" fill="#45B7D1">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M45 185 L48 188 L45 191 L42 188 Z" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.9s" repeatCount="indefinite"/>
    </path>
    <path d="M155 185 L158 188 L155 191 L152 188 Z" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Simple animated bounce indicators around the circle -->
  <g opacity="0.5" clip-path="url(#circleClip)">
    <!-- Bounce indicators with simple animations -->
    <circle cx="32" cy="172" r="2" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42" cy="168" r="1.5" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="172" r="2" fill="#45B7D1">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="168" cy="172" r="2" fill="#96CEB4">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="158" cy="168" r="1.5" fill="#FF8E53">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="148" cy="172" r="2" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Top bounce indicators -->
    <circle cx="32" cy="28" r="2" fill="#FF6B6B">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="168" cy="28" r="2" fill="#4ECDC4">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Circular border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#boingGradient)" stroke-width="2" opacity="0.3"/>
</svg> 