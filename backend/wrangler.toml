# Cloudflare Workers Configuration for boing.finance API
# 
# IMPORTANT: The base worker name "boing-api" is kept for local development only.
# Production deployments use environment-specific workers:
# - Production: boing-api-prod (via --env production)
# - Staging: boing-api-staging (via --env staging)
#
# The unused "boing-api" worker in Cloudflare dashboard can be safely deleted.

name = "boing-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "10374f367672f4d19db430601db0926b"

# Environment variables
[vars]
NODE_ENV = "development"
FRONTEND_URL = "http://localhost:3000"
# Worker URL for generating file URLs (auto-detected from request if not set)
# WORKER_URL = "https://boing-api-staging.nico-chikuji.workers.dev"

[env.production]
name = "boing-api-prod"

[env.production.vars]
NODE_ENV = "production"
FRONTEND_URL = "https://boing.finance"
WORKER_URL = "https://boing-api-prod.nico-chikuji.workers.dev"

[env.staging]
name = "boing-api-staging"

[env.staging.vars]
NODE_ENV = "staging"
FRONTEND_URL = "https://staging.boing.finance"
WORKER_URL = "https://boing-api-staging.nico-chikuji.workers.dev"

# D1 Database - Updated with actual database ID
[[d1_databases]]
binding = "DB"
database_name = "boing-database"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

# R2 Bucket for file storage
[[r2_buckets]]
binding = "BOING_STORAGE"
bucket_name = "boing-storage"
preview_bucket_name = "boing-storage-preview"

# Environment-specific D1 databases
[[env.production.d1_databases]]
binding = "DB"
database_name = "boing-database-prod"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "boing-database-staging"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

# Environment-specific R2 buckets
[[env.production.r2_buckets]]
binding = "BOING_STORAGE"
bucket_name = "boing-storage"

[[env.staging.r2_buckets]]
binding = "BOING_STORAGE"
bucket_name = "boing-storage-preview"

# KV Namespace for caching (optional - for advanced caching)
# To enable KV caching, run: wrangler kv:namespace create "BOING_CACHE"
# Then add the namespace ID below
# [[kv_namespaces]]
# binding = "CACHE"
# id = "" # Add your KV namespace ID here
# preview_id = "" # Add your KV preview namespace ID here
#
# Note: Currently using HTTP cache headers for caching.
# KV can be added later for more advanced caching needs.

# Secrets (set via wrangler secret put)
# ETHEREUM_RPC_URL
# POLYGON_RPC_URL
# BSC_RPC_URL
# SEPOLIA_RPC_URL
# ETHERSCAN_API_KEY
# JWT_SECRET

# Cron triggers for background jobs
[triggers]
crons = ["0 * * * *"] # Run every hour to collect analytics data

# Limits - Removed CPU limits for Free plan compatibility
# [limits]
# cpu_ms = 50 